{% extends "base.html" %} {% block content %}

<form action="{{url_for('login')}}" method="post">
  <label> nome </label>
  <input
    type="text"
    name="nome"
    placeholder="Insira seu nome."
    required
    class="form-control"
  />

  <label> email </label>
  <input
    type="text"
    name="email"
    placeholder="Insira seu email"
    required
    class="form-control"
  />

  <label> Senha </label>
  <input
    type="password"
    name="senha"
    placeholder="Insira sua senha"
    required
    class="form-control"
  />
  <input type="submit" value="Cadastrar" class="botaoCadastro" />
  <input type="reset" value="Limpar" class="botaoLimpar" />
</form>

<h4>Não possui conta? <a href="{{url_for('cadastro')}}">Cadastre-se!</a></h4>

{% endblock content %}
